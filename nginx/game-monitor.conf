upstream backend_api {
    # 负载均衡策略：最少连接数（适合长处理请求）
    least_conn;
    # 主服务器
    server 127.0.0.1:3001 weight=5 max_fails=3 fail_timeout=30s;
    # 备用/扩展服务器（按需取消注释）
    # server 127.0.0.1:3003 weight=3 max_fails=3 fail_timeout=30s backup;
}

upstream backend_ws {
    # WebSocket 使用 ip_hash 保持会话
    ip_hash;
    server 127.0.0.1:3002;
    # server 127.0.0.1:3004;
}

# ===================== HTTP 服务 =====================
server {
    listen 80;
    server_name localhost;

    # ---- 日志 ----
    access_log off;
    error_log  /var/log/nginx/game-error.log warn;

    # ---- 文件上传大小（告警导出）----
    client_max_body_size 50m;

    # ============ 静态资源（前端打包后放这里）============
    location / {
        root   D:/game-monitor-system/frontend-dist;
        index  index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存 30 天
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ============ HTTP API 反向代理（负载均衡）============
    location /api/ {
        proxy_pass http://backend_api/api/;

        # 超时控制（对标 ≤150ms 延迟要求）
        proxy_connect_timeout 5s;
        proxy_send_timeout    150s;
        proxy_read_timeout    150s;

        # 透传真实客户端 IP
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Host               $host;
    }

    # ============ WebSocket 反向代理 ============
    location /ws/ {
        proxy_pass http://backend_ws;

        # WebSocket 握手必需头
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # 超时（保持长连接）
        proxy_connect_timeout 5s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # 透传 IP
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host              $host;
    }

    # ============ 健康检查接口 ============
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
